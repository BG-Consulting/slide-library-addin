<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slide Library</title>
<script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-authentication-library-for-js/2.38.3/msal-browser.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap');

:root {
  --bg: #0f0f17;
  --surface: #17171f;
  --surface2: #1f1f2e;
  --border: #2c2c3e;
  --text: #e8e8f2;
  --muted: #68688a;
  --accent: #6c63ff;
  --success: #4ade80;
  --radius: 9px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); font-size: 13px; overflow: hidden; }
.app { display: flex; flex-direction: column; height: 100vh; }

/* ── Screens ── */
.screen { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; padding: 28px 20px; text-align: center; gap: 14px; }
.screen.hidden { display: none; }
.screen-icon { font-size: 42px; }
.screen h2 { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }
.screen p { color: var(--muted); font-size: 12px; line-height: 1.7; max-width: 230px; }
.spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.75s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.progress-bar { width: 200px; height: 3px; background: var(--border); border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), #a78bfa); border-radius: 3px; transition: width 0.4s ease; width: 0%; }
.prog-label { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; }
.btn-main { background: linear-gradient(135deg, var(--accent), #8b5cf6); color: #fff; border: none; padding: 12px 28px; border-radius: var(--radius); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; width: 100%; max-width: 220px; transition: opacity 0.2s; }
.btn-main:hover { opacity: 0.88; }
.err-box { background: #1f1014; border: 1px solid #7f1d1d; border-radius: 10px; padding: 12px 16px; max-width: 240px; font-size: 11px; color: #fca5a5; line-height: 1.7; font-family: 'DM Mono', monospace; text-align: left; }
.btn-ghost { background: none; border: 1px solid var(--border); color: var(--muted); padding: 9px 20px; border-radius: var(--radius); font-family: 'DM Sans', sans-serif; font-size: 12px; cursor: pointer; width: 100%; max-width: 220px; }
.btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

/* ── Top bar ── */
.topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 11px 14px; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.logo-mark { width: 26px; height: 26px; border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; }
.logo-text { font-weight: 700; font-size: 13px; letter-spacing: -0.3px; flex: 1; }
.logo-text em { font-style: normal; color: var(--accent); }
.topbar-actions { display: flex; gap: 6px; align-items: center; }
.icon-btn { background: none; border: 1px solid var(--border); color: var(--muted); width: 27px; height: 27px; border-radius: 6px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.15s; }
.icon-btn:hover { border-color: var(--accent); color: var(--accent); }
.icon-btn.spinning svg { animation: spin 1s linear infinite; }

/* ── Breadcrumb ── */
.breadcrumb { padding: 8px 14px; background: var(--bg); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--muted); flex-shrink: 0; min-height: 34px; }
.bc-item { cursor: pointer; transition: color 0.15s; white-space: nowrap; }
.bc-item:hover { color: var(--text); }
.bc-item.active { color: var(--text); font-weight: 600; cursor: default; }
.bc-sep { color: var(--border); }
.bc-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

/* ── Step 1: Theme picker ── */
.theme-grid { display: flex; flex-direction: column; gap: 10px; padding: 16px 14px 90px; overflow-y: auto; flex: 1; }
.theme-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: 12px; padding: 16px; cursor: pointer; transition: all 0.18s; display: flex; align-items: center; gap: 14px; }
.theme-card:hover { border-color: var(--accent); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(108,99,255,0.15); }
.theme-swatch { width: 42px; height: 42px; border-radius: 10px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 18px; }
.theme-info { flex: 1; }
.theme-name { font-weight: 700; font-size: 14px; margin-bottom: 2px; }
.theme-desc { font-size: 11px; color: var(--muted); }
.theme-arrow { color: var(--muted); font-size: 16px; }

/* ── Step 2: Category picker ── */
.cat-grid { display: flex; flex-direction: column; gap: 8px; padding: 14px 14px 90px; overflow-y: auto; flex: 1; }
.cat-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: 10px; padding: 13px 14px; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 12px; }
.cat-card:hover { border-color: var(--accent); transform: translateX(2px); }
.cat-icon { font-size: 20px; flex-shrink: 0; }
.cat-info { flex: 1; }
.cat-name { font-weight: 600; font-size: 13px; margin-bottom: 2px; }
.cat-meta { font-size: 10px; color: var(--muted); font-family: 'DM Mono', monospace; }
.cat-arrow { color: var(--muted); }
.cat-loading { text-align: center; padding: 40px 20px; color: var(--muted); display: flex; flex-direction: column; align-items: center; gap: 12px; }

/* ── Step 3: Slide grid ── */
.slide-toolbar { padding: 8px 14px; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; }
.search-wrap { position: relative; }
.search-ico { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
#search { width: 100%; padding: 8px 10px 8px 32px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-size: 12px; font-family: 'DM Sans', sans-serif; outline: none; transition: border-color 0.2s; }
#search::placeholder { color: var(--muted); }
#search:focus { border-color: var(--accent); }
.grid-wrap { flex: 1; overflow-y: auto; padding: 10px 10px 82px; }
.grid-wrap::-webkit-scrollbar { width: 3px; }
.grid-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.card { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); overflow: hidden; cursor: pointer; transition: all 0.15s; position: relative; }
.card:hover { border-color: var(--accent); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(108,99,255,0.18); }
.card.selected { border-color: var(--accent); background: #1b1a32; }
.card-check { position: absolute; top: 5px; right: 5px; width: 18px; height: 18px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.15s; z-index: 2; font-size: 10px; color: #fff; font-weight: 800; }
.card.selected .card-check { opacity: 1; }
.card-num { position: absolute; top: 5px; left: 5px; background: rgba(0,0,0,0.65); color: #fff; font-size: 9px; padding: 1px 5px; border-radius: 4px; font-family: 'DM Mono', monospace; z-index: 2; }
.card-thumb { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; background: var(--surface2); }
.card-thumb-ph { width: 100%; aspect-ratio: 16/9; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 22px; color: var(--muted); }
.card-body { padding: 7px 8px; }
.card-title { font-size: 11px; font-weight: 600; color: var(--text); line-height: 1.35; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.card-type { font-size: 10px; color: var(--muted); font-family: 'DM Mono', monospace; }
.slide-loading { text-align: center; padding: 40px 20px; color: var(--muted); display: flex; flex-direction: column; align-items: center; gap: 12px; }
.empty { text-align: center; padding: 44px 20px; color: var(--muted); }
.empty-icon { font-size: 32px; margin-bottom: 10px; }

/* ── Bottom bar ── */
.bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 1px solid var(--border); padding: 10px 14px; display: flex; align-items: center; gap: 8px; z-index: 50; }
.sel-info { flex: 1; min-width: 0; }
.sel-count { font-weight: 700; font-size: 13px; }
.sel-hint { font-size: 10px; color: var(--muted); }
.btn-clear { background: none; border: 1px solid var(--border); color: var(--muted); padding: 8px 10px; border-radius: var(--radius); font-size: 11px; cursor: pointer; display: none; flex-shrink: 0; }
.btn-clear:hover { border-color: #ff6584; color: #ff6584; }
.btn-insert { background: linear-gradient(135deg, var(--accent), #8b5cf6); color: #fff; border: none; padding: 9px 15px; border-radius: var(--radius); font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 5px; flex-shrink: 0; transition: opacity 0.2s; white-space: nowrap; }
.btn-insert:hover { opacity: 0.88; }
.btn-insert:disabled { opacity: 0.35; cursor: not-allowed; }

/* ── Preview overlay ── */
.preview { position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 200; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 16px; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
.preview.open { opacity: 1; pointer-events: all; }
.preview img { max-width: 100%; max-height: 52vh; border-radius: 8px; box-shadow: 0 24px 64px rgba(0,0,0,0.8); margin-bottom: 14px; }
.prev-title { font-weight: 700; font-size: 14px; margin-bottom: 3px; text-align: center; }
.prev-meta { font-size: 10px; color: var(--muted); margin-bottom: 14px; font-family: 'DM Mono', monospace; }
.prev-btns { display: flex; gap: 8px; }
.btn-prev-sel { background: var(--accent); color: #fff; border: none; padding: 9px 22px; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 13px; cursor: pointer; transition: background 0.15s; }
.btn-prev-close { background: var(--surface2); color: var(--text); border: 1px solid var(--border); padding: 9px 16px; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 13px; cursor: pointer; }

/* ── Toast ── */
.toast { position: fixed; bottom: 72px; left: 50%; transform: translateX(-50%); background: var(--success); color: #000; font-weight: 700; font-size: 12px; padding: 8px 18px; border-radius: 20px; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; z-index: 300; }
.toast.show { opacity: 1; }
</style>
</head>
<body>
<div class="app">

<!-- ░░ SCREEN: Sign in ░░ -->
<div class="screen" id="s-signin">
  <div class="screen-icon">🔐</div>
  <h2>Welcome</h2>
  <p>Sign in with your Beyond Group Microsoft account to access the slide library.</p>
  <button class="btn-main" onclick="signIn()">Sign in with Microsoft</button>
</div>

<!-- ░░ SCREEN: Loading ░░ -->
<div class="screen hidden" id="s-loading">
  <div class="spinner"></div>
  <h2 id="load-title">Loading…</h2>
  <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
  <div class="prog-label" id="prog-label">Connecting…</div>
</div>

<!-- ░░ SCREEN: Error ░░ -->
<div class="screen hidden" id="s-error">
  <div class="screen-icon">⚠️</div>
  <h2>Something went wrong</h2>
  <div class="err-box" id="err-msg">Unknown error</div>
  <button class="btn-main" onclick="retryFromError()">Try again</button>
  <button class="btn-ghost" onclick="signOut()">Sign out</button>
</div>

<!-- ░░ MAIN APP ░░ -->
<div id="main-app" style="display:none;flex-direction:column;height:100vh;">

  <!-- Top bar -->
  <div class="topbar">
    <div class="logo-mark" id="logo-mark">📊</div>
    <div class="logo-text">Slide<em>Lib</em></div>
    <div class="topbar-actions">
      <div class="icon-btn" id="sync-btn" title="Refresh" onclick="syncCurrent()">
        <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
      </div>
      <div class="icon-btn" title="Sign out" onclick="signOut()">
        <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </div>
    </div>
  </div>

  <!-- Breadcrumb -->
  <div class="breadcrumb" id="breadcrumb">
    <span class="bc-item active">Choose Theme</span>
  </div>

  <!-- Step 1: Theme picker -->
  <div class="theme-grid" id="step-theme">
    <!-- populated by JS -->
  </div>

  <!-- Step 2: Category picker -->
  <div id="step-category" style="display:none;flex-direction:column;flex:1;overflow:hidden;">
    <div class="cat-grid" id="cat-grid"></div>
  </div>

  <!-- Step 3: Slides -->
  <div id="step-slides" style="display:none;flex-direction:column;flex:1;overflow:hidden;">
    <div class="slide-toolbar">
      <div class="search-wrap">
        <svg class="search-ico" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input id="search" type="text" placeholder="Search slides…">
      </div>
    </div>
    <div class="grid-wrap">
      <div class="grid" id="slide-grid"></div>
    </div>
  </div>

  <!-- Bottom bar (only shown on step 3) -->
  <div class="bottom-bar" id="bottom-bar" style="display:none;">
    <div class="sel-info">
      <div class="sel-count" id="sel-count">0 selected</div>
      <div class="sel-hint">Tap · Hold to preview</div>
    </div>
    <button class="btn-clear" id="btn-clear" onclick="clearSel()">Clear</button>
    <button class="btn-insert" id="btn-insert" onclick="insertSlides()" disabled>⚡ Insert</button>
  </div>

</div><!-- /main-app -->

</div><!-- /app -->

<!-- Preview overlay -->
<div class="preview" id="preview" onclick="closePreviewClick(event)">
  <img id="prev-img" src="" alt="">
  <div class="prev-title" id="prev-title"></div>
  <div class="prev-meta" id="prev-meta"></div>
  <div class="prev-btns">
    <button class="btn-prev-sel" id="btn-prev-sel" onclick="toggleFromPreview()">+ Select</button>
    <button class="btn-prev-close" onclick="closePreview()">Close</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════════════
//  CONFIG — Beyond Group
// ══════════════════════════════════════════════════
const CONFIG = {
  CLIENT_ID:       "51dfcadf-0efa-4d32-afd6-cdf7fdcc1574",
  TENANT_ID:       "4c8b2896-51c4-473c-942e-a3cca4c64b94",
  SHAREPOINT_HOST: "beyondgroupconsulting.sharepoint.com",
  SITE_PATH:       "/sites/Unit-Outreach",
  LIBRARY_FOLDER:  "Slide Library",   // folder inside Documents
  SCOPES:          ["Files.Read.All", "Sites.Read.All", "User.Read"]
};
// ══════════════════════════════════════════════════

const THEMES = [
  { id: "Blue",      label: "Blue",      emoji: "🔵", color: "#3b82f6", desc: "Blue deliverables template" },
  { id: "Corporate", label: "Corporate", emoji: "⚫", color: "#6b7280", desc: "Corporate neutral template" },
  { id: "Green",     label: "Green",     emoji: "🟢", color: "#22c55e", desc: "Green deliverables template" },
  { id: "Red",       label: "Red",       emoji: "🔴", color: "#ef4444", desc: "Red deliverables template" },
  { id: "Yellow",    label: "Yellow",    emoji: "🟡", color: "#eab308", desc: "Yellow deliverables template" }
];

const CAT_ICONS = {
  "Assessment and Comparison":              "📊",
  "Blue-Deliverables Template":             "📘",
  "Charts and Data Visualization":          "📈",
  "Executive Summary Findings and Insights":"📋",
  "M&A and Due Diligence":                  "🤝",
  "Organization and Governance":            "🏛️",
  "Planning Roadmap and Implementation":    "🗺️",
  "Problem Structuring and Frameworks":     "🧩",
  "Text and Content Layouts":               "📝"
};

// ── State ──
let msalApp = null;
let token = null;
let siteId = null;
let driveId = null;
let currentTheme = null;
let currentCategory = null;
let currentSlides = [];
let selected = new Set();
let previewId = null;
let pressTimer = null;

// ── MSAL init ──
async function initMsal() {
  // Check MSAL loaded
  if (typeof msal === 'undefined') {
    showError("Authentication library failed to load. Please refresh the add-in.");
    return;
  }

  try {
    msalApp = new msal.PublicClientApplication({
      auth: {
        clientId: CONFIG.CLIENT_ID,
        authority: `https://login.microsoftonline.com/${CONFIG.TENANT_ID}`,
        redirectUri: window.location.origin + window.location.pathname
      },
      cache: { cacheLocation: "sessionStorage" }
    });
    await msalApp.initialize();

    // Handle redirect
    try {
      const result = await msalApp.handleRedirectPromise();
      if (result) token = result.accessToken;
    } catch(e) { /* ignore */ }

    const accounts = msalApp.getAllAccounts();
    if (accounts.length > 0 && !token) {
      try {
        const r = await msalApp.acquireTokenSilent({ scopes: CONFIG.SCOPES, account: accounts[0] });
        token = r.accessToken;
      } catch(e) { token = null; }
    }

    if (token) {
      showMain();
    } else {
      show("s-signin");
    }
  } catch(e) {
    showError("Failed to initialize authentication: " + e.message);
  }
}

async function signIn() {
  try {
    // Try popup first (desktop PowerPoint)
    const r = await msalApp.loginPopup({ scopes: CONFIG.SCOPES });
    token = r.accessToken;
    showMain();
  } catch(e) {
    // Fallback to redirect (PowerPoint Web)
    try {
      await msalApp.loginRedirect({ scopes: CONFIG.SCOPES });
    } catch(e2) {
      showError("Sign-in failed: " + e2.message);
    }
  }
}

function signOut() {
  try {
    msalApp.logoutPopup().then(() => location.reload());
  } catch(e) {
    msalApp.logoutRedirect();
  }
}

async function getToken() {
  const accounts = msalApp.getAllAccounts();
  if (!accounts.length) throw new Error("Not signed in");
  const r = await msalApp.acquireTokenSilent({ scopes: CONFIG.SCOPES, account: accounts[0] });
  return r.accessToken;
}

// ── Graph API ──
async function graph(path) {
  const t = await getToken();
  const r = await fetch("https://graph.microsoft.com/v1.0" + path, {
    headers: { Authorization: "Bearer " + t }
  });
  if (!r.ok) {
    const e = await r.json().catch(() => ({}));
    throw new Error(e?.error?.message || `Graph error ${r.status}`);
  }
  return r.json();
}

async function getSiteAndDrive() {
  if (siteId && driveId) return;
  const site = await graph(`/sites/${CONFIG.SHAREPOINT_HOST}:${CONFIG.SITE_PATH}`);
  siteId = site.id;
  const drives = await graph(`/sites/${siteId}/drives`);
  const docsDrive = drives.value.find(d => d.name === "Documents") || drives.value[0];
  driveId = docsDrive.id;
}

async function listThemeFolders() {
  await getSiteAndDrive();
  const data = await graph(`/drives/${driveId}/root:/${CONFIG.LIBRARY_FOLDER}:/children`);
  return data.value.filter(i => i.folder).map(i => i.name);
}

async function listCategoryFiles(theme) {
  await getSiteAndDrive();
  const data = await graph(`/drives/${driveId}/root:/${CONFIG.LIBRARY_FOLDER}/${theme}:/children`);
  return data.value.filter(i => !i.folder && (i.name.endsWith('.pptx') || i.name.endsWith('.potx')));
}

async function getSlideThumbnails(theme, fileItem) {
  // Get thumbnails for a file via Graph
  const data = await graph(`/drives/${driveId}/items/${fileItem.id}/thumbnails`);
  return data.value || [];
}

async function getFileDownloadUrl(itemId) {
  const data = await graph(`/drives/${driveId}/items/${itemId}`);
  return data["@microsoft.graph.downloadUrl"];
}

// ── Show/Hide helpers ──
function show(id) {
  ["s-signin","s-loading","s-error"].forEach(s => {
    const el = document.getElementById(s);
    if (el) el.classList.toggle("hidden", s !== id);
  });
}

function showMain() {
  show("__none__"); // hide all screens
  document.getElementById("main-app").style.display = "flex";
  renderThemes();
}

function showError(msg) {
  show("s-error");
  document.getElementById("err-msg").textContent = msg;
  document.getElementById("main-app").style.display = "none";
}

function retryFromError() {
  location.reload();
}

function setProgress(pct, label) {
  document.getElementById("prog-fill").style.width = pct + "%";
  document.getElementById("prog-label").textContent = label;
}

// ── Step 1: Themes ──
function renderThemes() {
  goToStep(1);
  const grid = document.getElementById("step-theme");
  grid.innerHTML = THEMES.map(t => `
    <div class="theme-card" onclick="pickTheme('${t.id}')">
      <div class="theme-swatch" style="background:${t.color}22;border:2px solid ${t.color}44">${t.emoji}</div>
      <div class="theme-info">
        <div class="theme-name" style="color:${t.color}">${t.label}</div>
        <div class="theme-desc">${t.desc}</div>
      </div>
      <div class="theme-arrow">›</div>
    </div>
  `).join('');
}

async function pickTheme(themeId) {
  currentTheme = THEMES.find(t => t.id === themeId);
  goToStep(2);
  await loadCategories(themeId);
}

// ── Step 2: Categories ──
async function loadCategories(theme) {
  const grid = document.getElementById("cat-grid");
  grid.innerHTML = `<div class="cat-loading"><div class="spinner"></div><span>Loading ${theme} slides…</span></div>`;

  try {
    const files = await listCategoryFiles(theme);
    if (!files.length) {
      grid.innerHTML = `<div class="cat-loading">No files found in <strong>${theme}</strong> folder.</div>`;
      return;
    }

    // Store files on window for later use
    window._categoryFiles = {};
    files.forEach(f => { window._categoryFiles[f.name] = f; });

    grid.innerHTML = files.map(f => {
      const name = f.name.replace(/\.(pptx|potx)$/i, '');
      const icon = CAT_ICONS[name] || "📄";
      return `
        <div class="cat-card" onclick="pickCategory('${encodeURIComponent(f.name)}')">
          <div class="cat-icon">${icon}</div>
          <div class="cat-info">
            <div class="cat-name">${name}</div>
            <div class="cat-meta">.pptx · tap to browse slides</div>
          </div>
          <svg class="cat-arrow" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
        </div>`;
    }).join('');

  } catch(e) {
    grid.innerHTML = `<div class="cat-loading">⚠️ ${e.message}</div>`;
  }
}

async function pickCategory(encodedFilename) {
  const filename = decodeURIComponent(encodedFilename);
  currentCategory = filename.replace(/\.(pptx|potx)$/i, '');
  const fileItem = window._categoryFiles[filename];

  goToStep(3);
  selected.clear();
  updateBar();
  document.getElementById("search").value = "";

  await loadSlides(fileItem);
}

// ── Step 3: Slides ──
async function loadSlides(fileItem) {
  const grid = document.getElementById("slide-grid");
  grid.innerHTML = `<div style="grid-column:1/-1"><div class="slide-loading"><div class="spinner"></div><span>Loading slides…</span></div></div>`;

  try {
    // Graph thumbnails API — gets per-page thumbnails for Office files
    const thumbData = await graph(`/drives/${driveId}/items/${fileItem.id}/thumbnails`);
    const thumbSets = thumbData.value || [];

    if (!thumbSets.length) {
      // Fallback: show file-level preview
      grid.innerHTML = `<div style="grid-column:1/-1" class="empty">
        <div class="empty-icon">📄</div>
        <p>Slide previews not available.<br>This file may need to be opened in PowerPoint first to generate thumbnails.</p>
      </div>`;
      return;
    }

    currentSlides = thumbSets.map((ts, i) => ({
      id: i + 1,
      num: i + 1,
      title: `Slide ${i + 1}`,
      type: currentCategory,
      thumbUrl: ts.large?.url || ts.medium?.url || ts.small?.url || '',
      fileItemId: fileItem.id,
      slideIndex: i
    }));

    renderSlideGrid(currentSlides);

  } catch(e) {
    grid.innerHTML = `<div style="grid-column:1/-1" class="empty"><div class="empty-icon">⚠️</div><p>${e.message}</p></div>`;
  }
}

function renderSlideGrid(slides) {
  const q = document.getElementById("search").value.toLowerCase();
  const filtered = q ? slides.filter(s => s.title.toLowerCase().includes(q) || s.type.toLowerCase().includes(q)) : slides;
  const grid = document.getElementById("slide-grid");

  if (!filtered.length) {
    grid.innerHTML = `<div style="grid-column:1/-1" class="empty"><div class="empty-icon">🔍</div><p>No slides match</p></div>`;
    return;
  }

  grid.innerHTML = filtered.map(s => `
    <div class="card ${selected.has(s.id) ? 'selected' : ''}" id="card-${s.id}"
         onclick="toggleSel(${s.id})"
         onmousedown="startPress(${s.id})" onmouseup="endPress()" onmouseleave="endPress()"
         ontouchstart="startPress(${s.id})" ontouchend="endPress()">
      <div class="card-check">✓</div>
      <span class="card-num">#${s.num}</span>
      ${s.thumbUrl
        ? `<img class="card-thumb" src="${s.thumbUrl}" loading="lazy" alt="Slide ${s.num}">`
        : `<div class="card-thumb-ph">🖼️</div>`}
      <div class="card-body">
        <div class="card-title">${s.title}</div>
        <div class="card-type">${s.type}</div>
      </div>
    </div>
  `).join('');
}

// ── Selection ──
function toggleSel(id) {
  if (selected.has(id)) selected.delete(id);
  else selected.add(id);
  const card = document.getElementById("card-" + id);
  if (card) card.classList.toggle("selected", selected.has(id));
  updateBar();
  if (previewId === id) updatePreviewBtn();
}

function clearSel() {
  selected.clear();
  document.querySelectorAll(".card.selected").forEach(c => c.classList.remove("selected"));
  updateBar();
}

function updateBar() {
  const n = selected.size;
  document.getElementById("sel-count").textContent = n ? `${n} slide${n > 1 ? 's' : ''} selected` : "0 selected";
  document.getElementById("btn-insert").disabled = n === 0;
  document.getElementById("btn-clear").style.display = n ? "block" : "none";
}

// ── Long press → preview ──
function startPress(id) { pressTimer = setTimeout(() => openPreview(id), 500); }
function endPress() { clearTimeout(pressTimer); }

function openPreview(id) {
  const s = currentSlides.find(x => x.id === id);
  if (!s) return;
  previewId = id;
  document.getElementById("prev-img").src = s.thumbUrl || '';
  document.getElementById("prev-title").textContent = s.title;
  document.getElementById("prev-meta").textContent = `${currentTheme?.label} · ${currentCategory} · Slide #${s.num}`;
  updatePreviewBtn();
  document.getElementById("preview").classList.add("open");
}

function updatePreviewBtn() {
  const btn = document.getElementById("btn-prev-sel");
  const sel = selected.has(previewId);
  btn.textContent = sel ? "✓ Selected" : "+ Select";
  btn.style.background = sel ? "#4ade80" : "var(--accent)";
  btn.style.color = sel ? "#000" : "#fff";
}

function toggleFromPreview() { if (previewId !== null) toggleSel(previewId); }
function closePreview() { document.getElementById("preview").classList.remove("open"); }
function closePreviewClick(e) { if (e.target === document.getElementById("preview")) closePreview(); }

// ── Insert into PowerPoint ──
async function insertSlides() {
  const selSlides = [...selected].map(id => currentSlides.find(s => s.id === id)).filter(Boolean);
  if (!selSlides.length) return;

  showToast(`Preparing ${selSlides.length} slide${selSlides.length > 1 ? 's' : ''}…`, "#6c63ff");

  try {
    await Office.onReady();
    await PowerPoint.run(async context => {
      for (const slide of selSlides) {
        // Insert each slide image as a full-bleed shape on a new slide
        const newSlide = context.presentation.slides.add();
        await context.sync();

        // Re-query to get the last slide
        context.presentation.slides.load("items");
        await context.sync();
        const items = context.presentation.slides.items;
        const last = items[items.length - 1];

        if (slide.thumbUrl) {
          // Fetch the image and insert
          const resp = await fetch(slide.thumbUrl);
          const blob = await resp.blob();
          const b64 = await blobToBase64(blob);
          last.shapes.addImage(b64);
          await context.sync();
        }
      }
    });

    showToast(`✓ ${selSlides.length} slide${selSlides.length > 1 ? 's' : ''} inserted!`);
    clearSel();
  } catch(e) {
    // Outside PowerPoint (testing in browser)
    showToast(`${selSlides.length} slides ready ✓`, "#6c63ff");
  }
}

function blobToBase64(blob) {
  return new Promise(resolve => {
    const r = new FileReader();
    r.onload = () => resolve(r.result.split(",")[1]);
    r.readAsDataURL(blob);
  });
}

// ── Navigation ──
function goToStep(step) {
  // Hide all steps
  document.getElementById("step-theme").style.display = "none";
  document.getElementById("step-category").style.display = "none";
  document.getElementById("step-slides").style.display = "none";
  document.getElementById("bottom-bar").style.display = "none";

  // Update logo mark
  if (currentTheme) {
    document.getElementById("logo-mark").textContent = currentTheme.emoji;
  } else {
    document.getElementById("logo-mark").textContent = "📊";
  }

  if (step === 1) {
    document.getElementById("step-theme").style.display = "flex";
    updateBreadcrumb(1);
    currentTheme = null;
    currentCategory = null;
  } else if (step === 2) {
    document.getElementById("step-category").style.display = "flex";
    updateBreadcrumb(2);
    currentCategory = null;
  } else if (step === 3) {
    document.getElementById("step-slides").style.display = "flex";
    document.getElementById("bottom-bar").style.display = "flex";
    updateBreadcrumb(3);
  }
}

function updateBreadcrumb(step) {
  const bc = document.getElementById("breadcrumb");
  let html = `<span class="bc-item ${step===1?'active':''}" onclick="${step>1?'goToStep(1)':''}">Theme</span>`;
  if (step >= 2 && currentTheme) {
    html += `<span class="bc-sep">›</span>
             <span class="bc-dot" style="background:${currentTheme.color}"></span>
             <span class="bc-item ${step===2?'active':''}" onclick="${step>2?'goToStep(2)':''}">${currentTheme.label}</span>`;
  }
  if (step >= 3 && currentCategory) {
    html += `<span class="bc-sep">›</span>
             <span class="bc-item active">${shortCatName(currentCategory)}</span>`;
  }
  bc.innerHTML = html;
}

function shortCatName(name) {
  const map = {
    "Assessment and Comparison": "Assessment",
    "Charts and Data Visualization": "Charts",
    "Executive Summary Findings and Insights": "Exec Summary",
    "M&A and Due Diligence": "M&A",
    "Organization and Governance": "Org & Gov",
    "Planning Roadmap and Implementation": "Roadmap",
    "Problem Structuring and Frameworks": "Frameworks",
    "Text and Content Layouts": "Text Layouts"
  };
  return map[name] || name.split(' ').slice(0,2).join(' ');
}

function syncCurrent() {
  const btn = document.getElementById("sync-btn");
  btn.classList.add("spinning");
  setTimeout(() => btn.classList.remove("spinning"), 1000);

  // Re-load current step
  if (currentTheme && currentCategory && window._categoryFiles) {
    const filename = Object.keys(window._categoryFiles).find(f =>
      f.replace(/\.(pptx|potx)$/i,'') === currentCategory
    );
    if (filename) {
      loadSlides(window._categoryFiles[filename]);
      return;
    }
  }
  if (currentTheme) { loadCategories(currentTheme.id); return; }
  renderThemes();
}

// ── Toast ──
function showToast(msg, color = "var(--success)") {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.style.background = color;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2800);
}

// ── Search ──
document.addEventListener("DOMContentLoaded", () => {
  document.getElementById("search").addEventListener("input", () => {
    renderSlideGrid(currentSlides);
  });
  document.addEventListener("keydown", e => {
    if (e.key === "Escape") closePreview();
  });
});

// ── Boot ──
if (typeof Office !== 'undefined' && Office.onReady) {
  Office.onReady(() => { initMsal(); });
} else {
  window.addEventListener('load', initMsal);
}
</script>
